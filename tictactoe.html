<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.6em;
      color: #a8dadc;
      font-weight: 600;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      user-select: none;
      border: 2px solid #0f3460;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x {
      color: #e94560;
    }

    .cell.o {
      color: #a8dadc;
    }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.6s ease-in-out;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #controls {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
    }

    button {
      padding: 0.6rem 1.6rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    #restart {
      background: #e94560;
      color: #fff;
    }

    #modeToggle {
      background: #0f3460;
      color: #a8dadc;
      border: 2px solid #a8dadc;
    }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: #888;
    }

    .score-item span {
      font-weight: 700;
      font-size: 1.3rem;
    }

    .score-item.x-score span { color: #e94560; }
    .score-item.o-score span { color: #a8dadc; }
    .score-item.tie-score span { color: #eee; }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>
  <div id="board"></div>

  <div id="controls">
    <button id="restart">Restart</button>
    <button id="modeToggle">vs Computer: OFF</button>
  </div>

  <div id="score">
    <div class="score-item x-score">X  <span id="scoreX">0</span></div>
    <div class="score-item tie-score">Ties  <span id="scoreTie">0</span></div>
    <div class="score-item o-score">O  <span id="scoreO">0</span></div>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const restartBtn = document.getElementById('restart');
    const modeBtn = document.getElementById('modeToggle');

    let board = Array(9).fill(null);
    let current = 'X';
    let gameOver = false;
    let vsComputer = false;
    let scores = { X: 0, O: 0, tie: 0 };

    const WIN_LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    function checkWinner(b) {
      for (const [a, c, d] of WIN_LINES) {
        if (b[a] && b[a] === b[c] && b[a] === b[d]) return { winner: b[a], line: [a, c, d] };
      }
      if (b.every(Boolean)) return { winner: 'tie' };
      return null;
    }

    function minimax(b, isMax) {
      const result = checkWinner(b);
      if (result) {
        if (result.winner === 'O') return 10;
        if (result.winner === 'X') return -10;
        return 0;
      }
      const scores = b.map((v, i) => {
        if (v) return null;
        const copy = [...b];
        copy[i] = isMax ? 'O' : 'X';
        return minimax(copy, !isMax);
      });
      return isMax
        ? Math.max(...scores.filter(s => s !== null))
        : Math.min(...scores.filter(s => s !== null));
    }

    function bestMove(b) {
      let best = -Infinity, move = -1;
      b.forEach((v, i) => {
        if (v) return;
        const copy = [...b];
        copy[i] = 'O';
        const score = minimax(copy, false);
        if (score > best) { best = score; move = i; }
      });
      return move;
    }

    function renderBoard(winLine = []) {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        if (winLine.includes(i)) cell.classList.add('win');
        cell.textContent = val || '';
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function updateScore() {
      document.getElementById('scoreX').textContent = scores.X;
      document.getElementById('scoreO').textContent = scores.O;
      document.getElementById('scoreTie').textContent = scores.tie;
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      if (vsComputer && current === 'O') return;
      makeMove(i);
    }

    function makeMove(i) {
      board[i] = current;
      const result = checkWinner(board);

      if (result) {
        renderBoard(result.line || []);
        if (result.winner === 'tie') {
          statusEl.textContent = "It's a tie!";
          scores.tie++;
        } else {
          statusEl.textContent = `Player ${result.winner} wins!`;
          scores[result.winner]++;
        }
        updateScore();
        gameOver = true;
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      renderBoard();
      statusEl.textContent = vsComputer && current === 'O'
        ? 'Computer is thinking...'
        : `Player ${current}'s turn`;

      if (vsComputer && current === 'O' && !gameOver) {
        setTimeout(() => {
          const move = bestMove(board);
          if (move !== -1) makeMove(move);
        }, 300);
      }
    }

    function restart() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      statusEl.textContent = "Player X's turn";
      renderBoard();
    }

    restartBtn.addEventListener('click', restart);

    modeBtn.addEventListener('click', () => {
      vsComputer = !vsComputer;
      modeBtn.textContent = `vs Computer: ${vsComputer ? 'ON' : 'OFF'}`;
      restart();
    });

    renderBoard();
  </script>
</body>
</html>
